<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITELSA Lighting — Tablero</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f5f5f4;--bg3:#f0efed;--tx:#1a1a18;--tx2:#6b6b67;--tx3:#9b9b96;--br:rgba(0,0,0,0.1);--br2:rgba(0,0,0,0.18);--r:8px;--rl:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);min-height:100vh}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg3)}
.login-card{background:var(--bg);border:1px solid var(--br);border-radius:var(--rl);padding:32px 28px;width:340px;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,0.07)}
.login-logo{width:96px;height:96px;object-fit:contain;margin:0 auto 12px;display:block}
.login-brand{font-size:12px;font-weight:600;color:#374151;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px}
.login-sub{font-size:13px;color:#9ca3af;margin-bottom:20px}
.member-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.member-btn{background:#f9f9f8;border:1px solid var(--br);border-radius:var(--r);padding:12px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all 0.15s}
.member-btn:hover{border-color:#9ca3af}
.member-btn.selected{border-color:#1D9E75;background:#f0fdf8}
.mb-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.mb-name{font-size:12px;color:#374151;font-weight:500}
.btn-enter{width:100%;background:#1D6B54;border:none;border-radius:var(--r);padding:11px;font-size:13px;color:#fff;cursor:pointer;font-weight:600;margin-top:16px}
.btn-enter:hover{background:#16543f}
.btn-enter:disabled{background:#d1d5db;cursor:default}
.app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--bg);border-bottom:1px solid var(--br);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-logo{display:flex;align-items:center;gap:9px}
.topbar-logo img{width:38px;height:38px;object-fit:contain}
.logo-text{line-height:1.1}
.logo-itelsa{font-size:14px;font-weight:700;color:#1f2937;letter-spacing:0.06em}
.logo-lighting{font-size:9px;color:#1D9E75;letter-spacing:0.12em;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:10px}
.save-ind{font-size:11px;color:#9ca3af;display:flex;align-items:center;gap:4px;opacity:0.6}
.team-row{display:flex;gap:4px}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s}
.avatar:hover{border-color:#9ca3af}
.avatar.af{border-color:#1D9E75}
.av1{background:#ede9fe;color:#5b21b6}.av2{background:#d1fae5;color:#065f46}.av3{background:#fef3c7;color:#92400e}.av4{background:#fee2e2;color:#991b1b}.av5{background:#dbeafe;color:#1e40af}
.current-user{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280;background:#f9f9f8;padding:5px 11px;border-radius:20px;border:1px solid var(--br);cursor:pointer}
.current-user:hover{border-color:#9ca3af}
.body-layout{display:flex;flex:1;min-height:calc(100vh - 58px)}
.sidebar{width:225px;background:var(--bg);border-right:1px solid var(--br);padding:12px 0;flex-shrink:0;overflow-y:auto}
.nav-tabs{display:flex;gap:3px;padding:0 12px;margin-bottom:12px;border-bottom:1px solid var(--br);padding-bottom:10px}
.nav-tab{flex:1;padding:6px 0;font-size:12px;text-align:center;background:transparent;border:1px solid transparent;border-radius:var(--r);cursor:pointer;color:#9ca3af;transition:all 0.1s}
.nav-tab.active{background:#f3f4f6;border-color:var(--br);color:#374151;font-weight:500}
.sb-section{padding:0 12px;margin-bottom:14px}
.sb-label{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:7px;font-weight:600;display:flex;align-items:center;gap:5px}
.sb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sb-divider{height:1px;background:var(--br);margin:10px 12px}
.proj-item{padding:7px 9px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:6px;margin-bottom:2px;transition:background 0.1s}
.proj-item:hover{background:#f3f4f6}
.proj-item.active{background:#f3f4f6;font-weight:500}
.proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.proj-name{font-size:12px;color:#374151;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-count{font-size:10px;color:#9ca3af;background:#f3f4f6;padding:1px 5px;border-radius:8px}
.proj-prio{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;flex-shrink:0}
.pp-alta{background:#fee2e2;color:#991b1b}.pp-media{background:#fef3c7;color:#92400e}.pp-baja{background:#d1fae5;color:#065f46}
.new-btn{width:100%;background:transparent;border:1px dashed #d1d5db;border-radius:var(--r);padding:7px 9px;font-size:12px;color:#9ca3af;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background 0.1s}
.new-btn:hover{background:#f3f4f6}
.fin-empty{font-size:11px;color:#9ca3af;padding:2px 0 6px}
.content{flex:1;overflow:auto;padding:20px}
.view{display:none}
.view.active{display:block}
.content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-p{background:#dbeafe;color:#1e40af}.badge-m{background:#fce7f3;color:#9d174d}.badge-f{background:#f3f4f6;color:#6b7280}
.header-actions{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.add-task-btn{background:transparent;border:1px solid #d1d5db;border-radius:var(--r);padding:6px 12px;font-size:12px;color:#6b7280;cursor:pointer;display:flex;align-items:center;gap:5px}
.add-task-btn:hover{background:#f3f4f6}
.btn-finalizar{background:#1D6B54;border:none;border-radius:var(--r);padding:6px 12px;font-size:12px;color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-finalizar:hover{background:#16543f}
.btn-reabrir{background:transparent;border:1px solid #d1d5db;border-radius:var(--r);padding:6px 12px;font-size:12px;color:#6b7280;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-eliminar{background:transparent;border:1px solid #fca5a5;border-radius:var(--r);padding:6px 10px;font-size:12px;color:#b91c1c;cursor:pointer}
.btn-eliminar:hover{background:#fef2f2}
.finished-banner{background:#f0fdf4;border:1px solid #86efac;border-radius:var(--r);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:12px;color:#166534}
.section-box{background:var(--bg);border:1px solid var(--br);border-radius:var(--rl);padding:14px 16px;margin-bottom:14px}
.section-box-title{font-size:11px;font-weight:600;color:#9ca3af;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em}
.proj-meta-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.meta-item label{font-size:11px;color:#9ca3af;display:block;margin-bottom:4px;font-weight:500}
.meta-item input,.meta-item select{width:100%;font-size:12px;padding:6px 9px;border-radius:var(--r);border:1px solid #d1d5db;background:#f9f9f8;color:#374151}
.meta-item input:focus,.meta-item select:focus{outline:none;border-color:#1D9E75}
.notes-area{width:100%;min-height:90px;font-size:13px;padding:10px;border-radius:var(--r);border:1px solid #d1d5db;background:#f9f9f8;color:#374151;resize:vertical;line-height:1.6;font-family:inherit}
.notes-area:focus{outline:none;border-color:#1D9E75}
.columns{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.col{background:#f9f9f8;border-radius:var(--r);padding:11px;min-height:180px;border:1px solid var(--br)}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.col-title{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em}
.col-badge{font-size:10px;background:var(--bg);border:1px solid var(--br);color:#9ca3af;padding:1px 6px;border-radius:8px}
.task-card{background:var(--bg);border:1px solid var(--br);border-radius:var(--r);padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:box-shadow 0.15s,border-color 0.15s}
.task-card:hover{border-color:#9ca3af;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.task-title{font-size:12px;color:#374151;margin-bottom:7px;line-height:1.4}
.task-meta{display:flex;align-items:center;justify-content:space-between}
.task-priority{font-size:10px;padding:2px 6px;border-radius:5px;font-weight:600}
.p-alta{background:#fee2e2;color:#991b1b}.p-media{background:#fef3c7;color:#92400e}.p-baja{background:#d1fae5;color:#065f46}
.task-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
.tag-due{font-size:10px;color:#9ca3af;display:flex;align-items:center;gap:3px}
/* GANTT */
.gantt-wrap{overflow-x:auto;border:1px solid var(--br);border-radius:var(--rl);padding:16px;background:var(--bg)}
.gantt{min-width:540px}
.gantt-header-row{display:flex;margin-bottom:8px;border-bottom:1px solid var(--br);padding-bottom:8px}
.gantt-label-col{width:170px;flex-shrink:0;font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.04em}
.gantt-months-row{flex:1;display:flex}
.gantt-month{flex:1;font-size:10px;color:#9ca3af;text-align:center;font-weight:600}
.gantt-row{display:flex;align-items:center;margin-bottom:9px}
.gantt-sec-row{display:flex;align-items:center;margin:12px 0 6px}
.gantt-sec-label{width:170px;flex-shrink:0;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.gantt-proj-label{width:170px;flex-shrink:0;display:flex;align-items:center;gap:6px;overflow:hidden}
.gantt-proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gantt-proj-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px;color:#374151}
.gantt-bar-area{flex:1;height:22px;position:relative;background:#f3f4f6;border-radius:6px}
.gantt-bar{position:absolute;height:100%;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:4px;font-weight:500}
.gantt-progress{position:absolute;top:0;left:0;height:100%;border-radius:6px;background:rgba(255,255,255,0.22)}
.today-line{position:absolute;top:-2px;bottom:-2px;width:2px;background:#ef4444;opacity:0.7;z-index:2;border-radius:1px}
.gantt-legend{display:flex;align-items:center;gap:16px;margin-top:14px;padding-top:12px;border-top:1px solid var(--br);flex-wrap:wrap}
.gl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#6b7280}
.gl-dot{width:8px;height:8px;border-radius:50%}
.gl-today{width:10px;height:2px;background:#ef4444;border-radius:1px}
.gantt-empty{font-size:13px;color:#9ca3af;text-align:center;padding:32px 0}
/* DETAIL */
.detail-panel{width:280px;background:var(--bg);border-left:1px solid var(--br);padding:16px;flex-shrink:0;display:none;flex-direction:column;gap:12px;overflow-y:auto}
.detail-panel.open{display:flex}
.dp-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.dp-close{background:transparent;border:none;cursor:pointer;color:#9ca3af;font-size:16px;padding:0;line-height:1}
.dp-title{font-size:13px;font-weight:600;color:#374151;line-height:1.4}
.dp-label{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;font-weight:600}
.dp-val{font-size:12px;color:#6b7280;line-height:1.5}
.status-sel{font-size:12px;padding:6px 8px;border-radius:var(--r);border:1px solid #d1d5db;background:#f9f9f8;color:#374151;width:100%}
.dp-activity{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto}
.activity-item{font-size:11px;color:#9ca3af;display:flex;align-items:flex-start;gap:6px;line-height:1.4}
.activity-dot{width:5px;height:5px;border-radius:50%;background:#d1d5db;flex-shrink:0;margin-top:4px}
.activity-who{font-weight:600;color:#6b7280}
/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:none;align-items:center;justify-content:center;z-index:200}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);border:1px solid var(--br);padding:20px;width:390px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px;color:#1f2937}
.fg{margin-bottom:10px}
.fg label{font-size:11px;color:#6b7280;margin-bottom:4px;display:block;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;font-size:13px;padding:7px 10px;border-radius:var(--r);border:1px solid #d1d5db;background:#f9f9f8;color:#374151}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#1D9E75}
.fg textarea{resize:vertical;min-height:60px}
.frow{display:flex;gap:10px}.frow .fg{flex:1}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.btn-cancel{background:transparent;border:1px solid #d1d5db;border-radius:var(--r);padding:7px 14px;font-size:13px;color:#6b7280;cursor:pointer}
.btn-save{background:#1D6B54;border:none;border-radius:var(--r);padding:7px 16px;font-size:13px;color:#fff;cursor:pointer;font-weight:600}
.btn-save:hover{background:#16543f}
.btn-danger{background:#b91c1c;border:none;border-radius:var(--r);padding:7px 16px;font-size:13px;color:#fff;cursor:pointer;font-weight:600}
.color-picker-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.cdot{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.1s}
.cdot.sel{border-color:#1f2937}
.member-opts{display:flex;gap:6px;flex-wrap:wrap}
.mopt{padding:5px 9px;border:1px solid #e5e7eb;border-radius:var(--r);cursor:pointer;font-size:11px;color:#6b7280;display:flex;align-items:center;gap:4px;transition:all 0.1s}
.mopt:hover{background:#f3f4f6}
.mopt.sel{border-color:#1D9E75;color:#374151;background:#f0fdf8}
.confirm-modal{background:var(--bg);border-radius:var(--rl);border:1px solid var(--br);padding:24px;width:320px;max-width:95vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.confirm-icon{font-size:30px;margin-bottom:10px}
.confirm-title{font-size:15px;font-weight:600;color:#1f2937;margin-bottom:8px}
.confirm-sub{font-size:13px;color:#6b7280;margin-bottom:20px;line-height:1.5}
.confirm-actions{display:flex;gap:8px;justify-content:center}
.empty{text-align:center;padding:60px 20px;color:#9ca3af;font-size:13px}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <img class="login-logo" id="login-logo" alt="ITELSA Lighting">
    <div class="login-brand">ITELSA Lighting</div>
    <div class="login-sub">¿Quién sos?</div>
    <div class="member-grid" id="member-grid"></div>
    <button class="btn-enter" id="btn-enter" disabled>Ingresar</button>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <img id="topbar-logo" alt="ITELSA">
      <div class="logo-text">
        <div class="logo-itelsa">ITELSA</div>
        <div class="logo-lighting">Lighting</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="save-ind" id="save-ind"><i class="ti ti-check" style="font-size:11px"></i><span id="save-txt">Guardado</span></div>
      <div class="team-row" id="team-avs"></div>
      <div class="current-user" id="cu-btn" onclick="logout()" title="Cambiar usuario"></div>
    </div>
  </div>
  <div class="body-layout">
    <div class="sidebar">
      <div class="nav-tabs">
        <button class="nav-tab active" id="tab-board" onclick="switchView('board')" title="Tablero"><i class="ti ti-layout-kanban" style="font-size:14px"></i></button>
        <button class="nav-tab" id="tab-cal" onclick="switchView('calendar')" title="Cronograma"><i class="ti ti-calendar" style="font-size:14px"></i></button>
      </div>
      <div class="sb-section">
        <div class="sb-label"><span class="sb-dot" style="background:#378ADD"></span>Proyectos</div>
        <div id="pl-proyectos"></div>
        <button class="new-btn" onclick="openNewProj('proyectos')"><i class="ti ti-plus" style="font-size:12px"></i> Nuevo proyecto</button>
      </div>
      <div class="sb-divider"></div>
      <div class="sb-section" style="margin-top:10px">
        <div class="sb-label"><span class="sb-dot" style="background:#D4537E"></span>Marketing</div>
        <div id="pl-marketing"></div>
        <button class="new-btn" onclick="openNewProj('marketing')"><i class="ti ti-plus" style="font-size:12px"></i> Nuevo proyecto</button>
      </div>
      <div class="sb-divider"></div>
      <div class="sb-section" style="margin-top:10px">
        <div class="sb-label"><span class="sb-dot" style="background:#16a34a"></span>Finalizados</div>
        <div id="pl-finalizados"></div>
        <div class="fin-empty" id="fin-empty">Sin proyectos finalizados</div>
      </div>
    </div>
    <div class="content">
      <div class="view active" id="view-board"><div id="board-inner"><div class="empty"><i class="ti ti-layout-board" style="font-size:32px;margin-bottom:10px;display:block"></i>Seleccioná un proyecto del panel izquierdo</div></div></div>
      <div class="view" id="view-calendar">
        <div style="font-size:18px;font-weight:600;color:#1f2937;margin-bottom:16px">Cronograma general</div>
        <div id="gantt-container"></div>
      </div>
    </div>
    <div class="detail-panel" id="detail-panel">
      <div class="dp-header"><span class="dp-title" id="dp-title"></span><button class="dp-close" onclick="closeDetail()"><i class="ti ti-x"></i></button></div>
      <div><div class="dp-label">Estado</div><select class="status-sel" id="dp-status" onchange="updateStatus(this.value)"><option value="pendiente">Pendiente</option><option value="en-curso">En curso</option><option value="terminado">Terminado</option></select></div>
      <div><div class="dp-label">Prioridad</div><span class="task-priority" id="dp-priority"></span></div>
      <div><div class="dp-label">Responsable</div><div id="dp-assignee" style="display:flex;align-items:center;gap:7px;font-size:12px;color:#374151"></div></div>
      <div><div class="dp-label">Fecha límite</div><div class="dp-val" id="dp-due"></div></div>
      <div><div class="dp-label">Descripción</div><div class="dp-val" id="dp-desc"></div></div>
      <div><div class="dp-label">Actividad</div><div class="dp-activity" id="dp-activity"></div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="mo-proj">
  <div class="modal">
    <div class="modal-title" id="mo-proj-title">Nuevo proyecto</div>
    <div class="fg"><label>Nombre</label><input type="text" id="pn-name" placeholder="Nombre del proyecto"></div>
    <div class="frow">
      <div class="fg"><label>Fecha inicio</label><input type="date" id="pn-start"></div>
      <div class="fg"><label>Fecha fin</label><input type="date" id="pn-end"></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Prioridad</label><select id="pn-prio"><option value="media">Media</option><option value="alta">Alta</option><option value="baja">Baja</option></select></div>
      <div class="fg"><label>Color</label><div class="color-picker-row" id="pn-colors"></div></div>
    </div>
    <div class="fg"><label>Miembros</label><div class="member-opts" id="pn-members"></div></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal('mo-proj')">Cancelar</button><button class="btn-save" onclick="saveProj()">Crear proyecto</button></div>
  </div>
</div>

<div class="modal-overlay" id="mo-task">
  <div class="modal">
    <div class="modal-title">Nueva tarea</div>
    <div class="fg"><label>Título</label><input type="text" id="tn-title" placeholder="¿Qué hay que hacer?"></div>
    <div class="fg"><label>Descripción</label><textarea id="tn-desc" placeholder="Detalles opcionales..."></textarea></div>
    <div class="frow">

    const b=document.createElement('button');b.className='member-btn';
    b.innerHTML=`<div class="mb-av ${m.cls}">${m.initials}</div><span class="mb-name">${m.name}</span>`;
    b.onclick=()=>{document.querySelectorAll('.member-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');document.getElementById('btn-enter').disabled=false;document.getElementById('btn-enter').onclick=()=>enterApp(m.id);};
    g.appendChild(b);
  });
}

function enterApp(id){
  currentUser=id;try{localStorage.setItem('itelsa_tablero_user',id);}catch(e){}
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  renderCurrentUser();renderTeam();renderProjList();
  const first=D.projects.find(p=>p.status==='activo');
  selProj=first?first.id:null;renderProjList();renderBoard();
}
function logout(){
  try{localStorage.removeItem('itelsa_tablero_user');}catch(e){}
  currentUser=null;selProj=null;selTask=null;filterMember=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.querySelectorAll('.member-btn').forEach(x=>x.classList.remove('selected'));
  document.getElementById('btn-enter').disabled=true;
}
function renderCurrentUser(){const m=TEAM.find(x=>x.id===currentUser);if(!m)return;document.getElementById('cu-btn').innerHTML=`<div class="task-av ${m.cls}" style="width:20px;height:20px;font-size:9px">${m.initials}</div><span>${m.name}</span><i class="ti ti-chevron-down" style="font-size:11px;opacity:0.5"></i>`;}
function switchView(v){curView=v;document.getElementById('view-board').classList.toggle('active',v==='board');document.getElementById('view-calendar').classList.toggle('active',v==='calendar');document.getElementById('tab-board').classList.toggle('active',v==='board');document.getElementById('tab-cal').classList.toggle('active',v==='calendar');if(v==='calendar')renderGantt();}
function renderTeam(){const c=document.getElementById('team-avs');c.innerHTML='';TEAM.forEach(m=>{const a=document.createElement('div');a.className='avatar '+m.cls+(filterMember===m.id?' af':'');a.title=m.name;a.textContent=m.initials;a.onclick=()=>{filterMember=filterMember===m.id?null:m.id;renderTeam();renderBoard();};c.appendChild(a);});}

function renderProjList(){
  ['proyectos','marketing'].forEach(sec=>{
    const c=document.getElementById('pl-'+sec);c.innerHTML='';
    D.projects.filter(p=>p.section===sec&&p.status==='activo').forEach(p=>{
      const cnt=D.tasks.filter(t=>t.projId===p.id).length;
      const div=document.createElement('div');div.className='proj-item'+(selProj===p.id?' active':'');
      div.innerHTML=`<span class="proj-dot" style="background:${p.color}"></span><span class="proj-name">${p.name}</span><span class="proj-prio pp-${p.priority}">${p.priority}</span><span class="proj-count">${cnt}</span>`;
      div.onclick=()=>{selProj=p.id;selTask=null;closeDetail();renderProjList();renderBoard();};
      c.appendChild(div);
    });
  });
  const fins=D.projects.filter(p=>p.status==='finalizado');
  const fc=document.getElementById('pl-finalizados');fc.innerHTML='';
  document.getElementById('fin-empty').style.display=fins.length?'none':'block';
  fins.forEach(p=>{
    const div=document.createElement('div');div.className='proj-item'+(selProj===p.id?' active':'');
    div.innerHTML=`<span class="proj-dot" style="background:${p.color};opacity:0.5"></span><span class="proj-name" style="opacity:0.6">${p.name}</span><i class="ti ti-circle-check" style="font-size:11px;color:#16a34a"></i>`;
    div.onclick=()=>{selProj=p.id;selTask=null;closeDetail();renderProjList();renderBoard();};
    fc.appendChild(div);
  });
}

function renderBoard(){
  const c=document.getElementById('board-inner');
  if(!selProj){c.innerHTML='<div class="empty"><i class="ti ti-layout-board" style="font-size:32px;margin-bottom:10px;display:block"></i>Seleccioná un proyecto del panel izquierdo</div>';return;}
  const proj=D.projects.find(p=>p.id===selProj);
  const isFin=proj.status==='finalizado';
  const bc=isFin?'badge-f':proj.section==='marketing'?'badge-m':'badge-p';
  const bl=isFin?'Finalizado':proj.section==='marketing'?'Marketing':'Proyectos';
  let ft=D.tasks.filter(t=>t.projId===selProj);
  if(filterMember)ft=ft.filter(t=>t.assignee===filterMember);
  const cols={pendiente:[],['en-curso']:[],terminado:[]};ft.forEach(t=>cols[t.status].push(t));
  const lbl={pendiente:'Pendiente','en-curso':'En curso',terminado:'Terminado'};
  const banner=isFin?`<div class="finished-banner"><i class="ti ti-circle-check" style="font-size:16px"></i>Proyecto finalizado — las tareas están en modo solo lectura.</div>`:'';
  c.innerHTML=`
    <div class="content-header">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span style="width:10px;height:10px;border-radius:50%;background:${proj.color};display:inline-block;flex-shrink:0"></span>
        <span style="font-size:17px;font-weight:600;color:#1f2937">${proj.name}</span>
        <span class="section-badge ${bc}">${bl}</span>
        <span class="proj-prio pp-${proj.priority}" style="font-size:11px;padding:2px 8px">${proj.priority}</span>
      </div>
      <div class="header-actions">
        ${!isFin
          ?`<button class="add-task-btn" onclick="openNewTask()"><i class="ti ti-plus" style="font-size:12px"></i> Nueva tarea</button>
             <button class="btn-finalizar" onclick="confirmFinalizar()"><i class="ti ti-circle-check" style="font-size:12px"></i> Finalizar</button>`
          :`<button class="btn-reabrir" onclick="reabrirProyecto()"><i class="ti ti-refresh" style="font-size:12px"></i> Reabrir</button>`}
        <button class="btn-eliminar" onclick="confirmEliminar()" title="Eliminar proyecto"><i class="ti ti-trash" style="font-size:13px"></i></button>
      </div>
    </div>
    ${banner}
    <div class="section-box">
      <div class="section-box-title">Información del proyecto</div>
      <div class="proj-meta-row">
        <div class="meta-item"><label>Fecha de inicio</label><input type="date" value="${proj.start||''}" ${isFin?'disabled':''} onchange="updateProjMeta('start',this.value)"></div>
        <div class="meta-item"><label>Fecha de fin</label><input type="date" value="${proj.end||''}" ${isFin?'disabled':''} onchange="updateProjMeta('end',this.value)"></div>
        <div class="meta-item"><label>Prioridad</label><select ${isFin?'disabled':''} onchange="updateProjMeta('priority',this.value)">
          <option value="alta" ${proj.priority==='alta'?'selected':''}>Alta</option>
          <option value="media" ${proj.priority==='media'?'selected':''}>Media</option>
          <option value="baja" ${proj.priority==='baja'?'selected':''}>Baja</option>
        </select></div>
      </div>
      <div><label style="font-size:11px;color:#9ca3af;display:block;margin-bottom:5px;font-weight:500">Notas adicionales</label>
        <textarea class="notes-area" placeholder="Información adicional, contactos, observaciones..." ${isFin?'disabled':''} onchange="updateProjMeta('notes',this.value)">${proj.notes||''}</textarea>
      </div>
    </div>
    <div class="columns">
      ${['pendiente','en-curso','terminado'].map(s=>`
        <div class="col">
          <div class="col-header"><span class="col-title">${lbl[s]}</span><span class="col-badge">${cols[s].length}</span></div>
          ${cols[s].length===0?'<div style="font-size:12px;color:#9ca3af;text-align:center;padding:18px 0">Sin tareas</div>':''}
          ${cols[s].map(t=>taskHTML(t)).join('')}
        </div>`).join('')}
    </div>`;
}

function taskHTML(t){
  const m=TEAM.find(x=>x.id===t.assignee);
  const due=t.due?`<span class="tag-due"><i class="ti ti-calendar" style="font-size:10px"></i>${t.due.slice(5).replace('-','/')}</span>`:'';
  return `<div class="task-card" onclick="openDetail('${t.id}')"><div class="task-title">${t.title}</div><div class="task-meta"><span class="task-priority p-${t.priority}">${t.priority}</span><div style="display:flex;align-items:center;gap:5px">${due}${m?`<div class="task-av ${m.cls}" title="${m.name}">${m.initials}</div>`:''}</div></div></div>`;
}

function updateProjMeta(f,v){const p=D.projects.find(x=>x.id===selProj);if(p){p[f]=v;scheduleSave();if(f==='start'||f==='end')renderGantt();if(f==='priority')renderProjList();}}

function confirmFinalizar(){
  document.getElementById('conf-icon').innerHTML='<i class="ti ti-circle-check" style="color:#16a34a;font-size:28px"></i>';
  document.getElementById('conf-title').textContent='¿Finalizar este proyecto?';
  document.getElementById('conf-sub').textContent='El proyecto pasará a la carpeta "Finalizados" y sus tareas quedarán en modo solo lectura.';
  const btn=document.getElementById('conf-btn');btn.className='btn-save';btn.textContent='Finalizar';
  btn.onclick=()=>{const p=D.projects.find(x=>x.id===selProj);if(p){p.status='finalizado';persist();renderProjList();renderBoard();}closeModal('mo-confirm');};
  document.getElementById('mo-confirm').classList.add('open');
}

function reabrirProyecto(){const p=D.projects.find(x=>x.id===selProj);if(p){p.status='activo';persist();renderProjList();renderBoard();}}

function confirmEliminar(){
  const p=D.projects.find(x=>x.id===selProj);
  document.getElementById('conf-icon').innerHTML='<i class="ti ti-trash" style="color:#b91c1c;font-size:28px"></i>';
  document.getElementById('conf-title').textContent='¿Eliminar este proyecto?';
  document.getElementById('conf-sub').textContent=`"${p.name}" y todas sus tareas se eliminarán permanentemente. Esta acción no se puede deshacer.`;
  const btn=document.getElementById('conf-btn');btn.className='btn-danger';btn.textContent='Eliminar';
  btn.onclick=()=>{D.tasks=D.tasks.filter(t=>t.projId!==selProj);D.projects=D.projects.filter(p=>p.id!==selProj);selProj=null;persist();renderProjList();renderBoard();closeModal('mo-confirm');};
  document.getElementById('mo-confirm').classList.add('open');
}

function openDetail(id){
  const proj=D.projects.find(p=>p.id===selProj);
  if(proj&&proj.status==='finalizado')return;
  selTask=id;const t=D.tasks.find(x=>x.id===id);const m=TEAM.find(x=>x.id===t.assignee);
  document.getElementById('dp-title').textContent=t.title;
  document.getElementById('dp-status').value=t.status;
  const pp=document.getElementById('dp-priority');pp.textContent=t.priority;pp.className='task-priority p-'+t.priority;
  document.getElementById('dp-assignee').innerHTML=m?`<div class="task-av ${m.cls}">${m.initials}</div><span>${m.name}</span>`:'<span style="color:#9ca3af">Sin asignar</span>';
  document.getElementById('dp-due').textContent=t.due||'Sin fecha';
  document.getElementById('dp-desc').textContent=t.desc||'Sin descripción.';
  renderActivity(t.activity||[]);
  document.getElementById('detail-panel').classList.add('open');
}
function renderActivity(log){const c=document.getElementById('dp-activity');if(!log||!log.length){c.innerHTML='<span style="font-size:11px;color:#9ca3af">Sin actividad registrada</span>';return;}c.innerHTML=[...log].reverse().map(a=>{const who=TEAM.find(x=>x.id===a.who);return `<div class="activity-item"><span class="activity-dot"></span><span><span class="activity-who">${who?who.name:'Alguien'}</span> ${a.action} · ${fmtTime(a.ts)}</span></div>`;}).join('');}
function closeDetail(){document.getElementById('detail-panel').classList.remove('open');selTask=null;}
function updateStatus(v){if(!selTask||!currentUser)return;const t=D.tasks.find(x=>x.id===selTask);if(!t||t.status===v)return;t.status=v;if(!t.activity)t.activity=[];t.activity.push({who:currentUser,action:`Cambió estado a ${v.replace('-',' ')}`,ts:Date.now()});persist();renderBoard();renderActivity(t.activity);}

function renderGantt(){
  const c=document.getElementById('gantt-container');
  const all=D.projects.filter(p=>p.start&&p.end);
  if(!all.length){c.innerHTML='<div class="gantt-empty"><i class="ti ti-calendar" style="font-size:28px;margin-bottom:10px;display:block"></i>Agregá fechas de inicio y fin a los proyectos para ver el cronograma</div>';return;}
  const dates=all.flatMap(p=>[new Date(p.start),new Date(p.end)]);
  let minD=new Date(Math.min(...dates)),maxD=new Date(Math.max(...dates));
  minD=new Date(minD.getFullYear(),minD.getMonth(),1);
  maxD=new Date(maxD.getFullYear(),maxD.getMonth()+1,0);
  const tMs=maxD-minD;
  const months=[];let cur=new Date(minD);
  while(cur<=maxD){months.push(new Date(cur));cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}
  const today=new Date();
  const todayPct=Math.min(100,Math.max(0,((today-minD)/tMs*100))).toFixed(2);
  const sections=[
    {label:'Proyectos',color:'#378ADD',filter:p=>p.section==='proyectos'&&p.status==='activo'},
    {label:'Marketing',color:'#D4537E',filter:p=>p.section==='marketing'&&p.status==='activo'},
    {label:'Finalizados',color:'#16a34a',filter:p=>p.status==='finalizado'},
  ];
  let html=`<div class="gantt-wrap"><div class="gantt">
    <div class="gantt-header-row">
      <div class="gantt-label-col">Proyecto</div>
      <div class="gantt-months-row">${months.map(m=>`<div class="gantt-month">${MN[m.getMonth()]} ${m.getFullYear()}</div>`).join('')}</div>
    </div>`;
  sections.forEach(sec=>{
    const ps=all.filter(sec.filter);if(!ps.length)return;
    html+=`<div class="gantt-sec-row"><div class="gantt-sec-label" style="color:${sec.color}">${sec.label}</div><div style="flex:1;height:1px;background:#e5e7eb;margin-left:8px"></div></div>`;
    ps.forEach(p=>{
      const s=new Date(p.start),e=new Date(p.end);
      const lp=Math.max(0,((s-minD)/tMs*100)).toFixed(2);
      const wp=Math.max(0.5,((e-s)/tMs*100)).toFixed(2);
      const done=D.tasks.filter(t=>t.projId===p.id&&t.status==='terminado').length;
      const total=D.tasks.filter(t=>t.projId===p.id).length;
      const progPct=total?Math.round(done/total*100):0;
      const op=p.status==='finalizado'?'0.45':'0.88';
      html+=`<div class="gantt-row">
        <div class="gantt-proj-label">
          <span class="gantt-proj-dot" style="background:${p.color}"></span>
          <span class="gantt-proj-name">${p.name}</span>
          <span class="proj-prio pp-${p.priority}" style="font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;flex-shrink:0">${p.priority}</span>
        </div>
        <div class="gantt-bar-area">
          <div class="today-line" style="left:${todayPct}%"></div>
          <div class="gantt-bar" style="left:${lp}%;width:${wp}%;background:${p.color};opacity:${op}" title="${p.start} → ${p.end}">
            <div class="gantt-progress" style="width:${progPct}%"></div>
            ${p.name} (${done}/${total})
          </div>
        </div>
      </div>`;
    });
  });
  html+=`</div>
    <div class="gantt-legend">
      <div class="gl-item"><div class="gl-dot" style="background:#378ADD"></div>Proyectos</div>
      <div class="gl-item"><div class="gl-dot" style="background:#D4537E"></div>Marketing</div>
      <div class="gl-item"><div class="gl-dot" style="background:#16a34a;opacity:0.5"></div>Finalizados</div>
      <div class="gl-item"><div class="gl-today"></div>Hoy</div>
    </div>
  </div>`;
  c.innerHTML=html;
}

function openNewProj(sec){
  nPS=sec;nPC=sec==='marketing'?COLORS[4]:COLORS[0];nPM=[];
  document.getElementById('pn-name').value='';document.getElementById('pn-start').value='';document.getElementById('pn-end').value='';document.getElementById('pn-prio').value='media';
  document.getElementById('mo-proj-title').textContent=sec==='marketing'?'Nuevo proyecto de marketing':'Nuevo proyecto';
  document.getElementById('pn-colors').innerHTML=COLORS.map(c=>`<div class="cdot${c===nPC?' sel':''}" style="background:${c}" onclick="selColor('${c}',this)"></div>`).join('');
  document.getElementById('pn-members').innerHTML=TEAM.map(m=>`<div class="mopt" id="mo-${m.id}" onclick="togM('${m.id}')"><div class="task-av ${m.cls}" style="width:17px;height:17px;font-size:9px">${m.initials}</div>${m.name}</div>`).join('');
  document.getElementById('mo-proj').classList.add('open');setTimeout(()=>document.getElementById('pn-name').focus(),50);
}
function selColor(c,el){nPC=c;document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('sel'));el.classList.add('sel');}
function togM(id){const el=document.getElementById('mo-'+id);if(nPM.includes(id)){nPM=nPM.filter(x=>x!==id);el.classList.remove('sel');}else{nPM.push(id);el.classList.add('sel');}}
function saveProj(){
  const name=document.getElementById('pn-name').value.trim();if(!name)return;
  D.projects.push({id:nextId('p'),name,color:nPC,members:nPM,start:document.getElementById('pn-start').value,end:document.getElementById('pn-end').value,notes:'',section:nPS,priority:document.getElementById('pn-prio').value,status:'activo'});
  persist();closeModal('mo-proj');renderProjList();
}
function openNewTask(){
  document.getElementById('tn-title').value='';document.getElementById('tn-desc').value='';document.getElementById('tn-due').value='';
  document.getElementById('tn-priority').value='media';document.getElementById('tn-status').value='pendiente';
  document.getElementById('tn-assign').innerHTML='<option value="">Sin asignar</option>'+TEAM.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  document.getElementById('mo-task').classList.add('open');setTimeout(()=>document.getElementById('tn-title').focus(),50);
}
function saveTask(){
  const title=document.getElementById('tn-title').value.trim();if(!title||!selProj)return;
  D.tasks.push({id:nextId('ta'),projId:selProj,title,desc:document.getElementById('tn-desc').value.trim(),assignee:document.getElementById('tn-assign').value,priority:document.getElementById('tn-priority').value,status:document.getElementById('tn-status').value,due:document.getElementById('tn-due').value,activity:[{who:currentUser,action:'Creó la tarea',ts:Date.now()}]});
  persist();closeModal('mo-task');renderProjList();renderBoard();
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

loadData();
const su=localStorage.getItem('itelsa_tablero_user');
if(su&&TEAM.find(x=>x.id===su)){enterApp(su);}else{buildLogin();}
</script>
</body>
</html>
